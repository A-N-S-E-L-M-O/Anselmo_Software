;  ============================================================
;   Selmo - image / generative model parameters
;  ------------------------------------------------------------
;   Twin of selmo-models.ini, for the IMAGE side of the startup
;   window. The launcher scans image\ for diffusion models
;   (text-encoders and VAEs are skipped) and matches each against
;   a [section] here by case-insensitive substring of the file
;   name. FIRST match wins; [default] is the fallback.
;
;   Keys read by the launcher:
;     files  = the FIXED sd-cli companion flags for this model
;              (text encoder + VAE + anything architecture-
;              specific). Paths are relative to the Selmo folder.
;              Forwarded verbatim; NOT shown as editable.
;                Z-Image : --llm <qwen>   --vae <ae>
;                FLUX    : --clip_l <l> --t5xxl <t5> --vae <ae>
;                SD3.5   : --clip_l <l> --clip_g <g> --t5xxl <t5> --vae <ae>
;                Qwen-Image : --llm <qwen2.5-vl> --vae <qwen_image_vae>
;                             --sampling-method euler --flow-shift 3
;     params = the EDITABLE tuning string shown under the picker.
;              Just the key knobs: --steps and --cfg-scale.
;     note   = short label shown next to the model in the menu.
;     offload= set to 'always' for models too big to be GPU-resident on
;              12 GB even after the LLM is unloaded (e.g. Qwen-Image 20B):
;              the bridge then forces --offload-to-cpu (streams from RAM,
;              slower). Omit/blank = normal swap (full GPU at full speed).
;
;   The launcher ALWAYS manages these itself (don't put them in
;   files/params; if you do, they're stripped):
;       --diffusion-model (your menu pick)   -p / -W / -H / --seed / -o
;       --init-img / --strength (img2img)    --offload-to-cpu
;       --diffusion-fa (always on)
;
;   Lines starting with ';' are comments.
;  ============================================================

[default]
files=--vae image\ae.safetensors
params=--steps 8 --cfg-scale 1.0
note=Unknown image model - set its encoder/VAE flags in files=

; --- Z-Image-Turbo (Apache 2.0): 6B distilled, Qwen3-4B text encoder ---
[z_image]
files=--llm image\Qwen3-4B-Instruct-2507-Q4_K_M.gguf --vae image\ae.safetensors
params=--steps 8 --cfg-scale 1.0
note=Z-Image-Turbo - 6B distilled, ~8 steps, cfg 1.0
tip=Z-Image-Turbo - distilled 6B text-to-image, Apache 2.0. Few steps (~8) at cfg 1.0: the fast default generator. Uses the Qwen3-4B encoder + ae VAE.

; --- Z-Image-Base (Apache 2.0): the non-distilled 6B sibling of Turbo.
;     Higher quality, needs real guidance (cfg ~5.0) and more steps. Reuses
;     the SAME Qwen3-4B encoder + ae.safetensors VAE as Turbo, so the only
;     extra download is the diffusion file (z-image-*.gguf, unsloth/Z-Image-GGUF).
;     NB hyphen 'z-image' vs Turbo's underscore 'z_image' keeps the two apart.
[z-image]
files=--llm image\Qwen3-4B-Instruct-2507-Q4_K_M.gguf --vae image\ae.safetensors
params=--steps 20 --cfg-scale 5.0
note=Z-Image-Base (Apache 2.0) - 6B, higher quality than Turbo; reuses Turbo encoder+VAE
tip=Z-Image-Base - the non-distilled 6B sibling of Turbo, Apache 2.0. Higher fidelity but needs real guidance (cfg ~5) and ~20 steps; reuses Turbo's encoder and VAE.

; --- Qwen-Image-2512 (Apache 2.0): 20B MMDiT, best-in-class text rendering.
;     NOT distilled, so 20-50 steps -> minutes per image. Too big for 12 GB
;     even with the LLM unloaded, so offload=always (streams from RAM).
;     Drop into image\: the diffusion GGUF (e.g. Qwen-Image-2512-Q3_K_M.gguf),
;     qwen_image_vae.safetensors, and Qwen2.5-VL-7B-Instruct-*.gguf.
[qwen-image]
files=--llm image\Qwen2.5-VL-7B-Instruct.Q4_K_M.gguf --vae image\qwen_image_vae.safetensors --sampling-method euler --flow-shift 3
params=--steps 20 --cfg-scale 2.5
offload=always
note=Qwen-Image-2512 (Apache 2.0) - 20B, superb text; SLOW on 12GB (offload). Needs Qwen2.5-VL-7B + qwen_image_vae
tip=Qwen-Image-2512 - 20B MMDiT, Apache 2.0, best-in-class text rendering. Not distilled, 20-50 steps = minutes per image; too big for 12GB so it streams from RAM (offload).

; --- FLUX.1-schnell (Apache 2.0): 4-step distilled. Diffusion + ae.safetensors
;     already present; download clip_l + t5xxl (shared with SD3.5) into image\.
;     --clip-on-cpu keeps the text encoders off the GPU so 12 GB is enough.
[flux1-schnell]
files=--clip_l image\clip_l.safetensors --t5xxl image\t5xxl_fp8_e4m3fn.safetensors --vae image\ae.safetensors --clip-on-cpu
params=--steps 4 --cfg-scale 1.0
note=FLUX.1-schnell (Apache 2.0) - 4 steps. Needs clip_l + t5xxl in image\
tip=FLUX.1-schnell - Apache 2.0, 4-step distilled. Fast and clean; needs clip_l + t5xxl text encoders (shared with SD3.5), kept on CPU so 12GB is enough.

; --- SD3.5-medium-turbo: Stability COMMUNITY license (NOT Apache - borderline
;     for the manifesto). Needs clip_l + clip_g + t5xxl + the SD3.5 VAE (the FLUX
;     ae.safetensors is a different VAE). Turbo -> few steps, low cfg.
[sd3.5]
files=--clip_l image\clip_l.safetensors --clip_g image\clip_g.safetensors --t5xxl image\t5xxl_fp8_e4m3fn.safetensors --vae image\sd3.5_vae.safetensors --clip-on-cpu
params=--steps 6 --cfg-scale 1.5
note=SD3.5-medium-turbo (Stability Community license) - needs clip_g + t5xxl + SD3.5 VAE
tip=SD3.5-medium-turbo - Stability Community license (borderline for the manifesto). Few steps, low cfg; needs clip_l + clip_g + t5xxl and the SD3.5 VAE (not the FLUX ae).
