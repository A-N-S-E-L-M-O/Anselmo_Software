;  ============================================================
;   Selmo - server parameters     (edit this file freely)
;  ------------------------------------------------------------
;   This file IS the command line. Each [section] has a `srv`
;   line: the exact string of llama-server flags passed at
;   launch. Pick a model in the launcher, see its `srv` string,
;   press ENTER to keep it or type/paste a new one. Full control.
;
;   Each [section] name is matched, case-insensitive, as a
;   substring of the model's file name. FIRST match wins, so put
;   more specific names higher (e.g. LFM2.5 above LFM2). If
;   nothing matches, [default] is used.
;
;   Keys read by the launcher:
;     srv  = the llama-server flags, forwarded VERBATIM. Put any
;            llama-server option here: --ctx-size, -ngl,
;            --n-cpu-moe, --flash-attn, --cache-type-k, --temp,
;            --top-k, --reasoning-format, --rope-scaling, etc.
;     max  = model's NATIVE context (its ceiling), shown as a
;            reminder. Not passed to the server.
;     note = short label shown next to the model in the menu.
;     chunking_size = SELMO-ONLY (not a server flag). How many
;            tokens the model handles well as input per chunk.
;            n_chunks = document_tokens / chunking_size.
;            The remaining ctx budget goes to reasoning + output.
;            Written to selmo-config.json for chat.html.
;     think = SELMO-ONLY (not a server flag). How this model's
;            reasoning is toggled by the THINK button. Written to
;            selmo-config.json for chat.html. One of:
;              instr  -> reasoning is driven by a system instruction
;                        (Magistral): button ON injects it, OFF omits
;                        it. The button is the single source of truth.
;              kwarg  -> send chat_template_kwargs.enable_thinking
;                        true/false per request (Qwen3 / hybrid models;
;                        an in-prompt /no_think is ignored by these).
;              native -> the model always reasons (Olmo <think>,
;                        Gemma <|think|>): no real OFF, so the button
;                        is locked ON and just reflects reality.
;              (absent) on a reasoning model -> chat.html falls back to
;                        auto-detecting from the chat template, as before.
;            Omit it entirely for non-reasoning models (no THINK button).
;
;   Key ignored by the launcher (a note for you):
;     use  = when to use it + compliance / data-origin status.
;
;   The launcher ALWAYS manages 4 structural flags itself, so the
;   app can't break no matter what you type in `srv`:
;       --model (your menu pick) --host 0.0.0.0 --port 8080
;       --path <selmo folder, for serving chat.html>
;   Don't put those in `srv`; if you do, they're ignored.
;   mmproj (vision) is auto-detected next to the model and added
;   automatically with --batch-size/--ubatch-size 2048.
;
;   Flags worth keeping in srv (features depend on them):
;     --reasoning-format deepseek  -> the THINK / reasoning panel
;     --timeout 600                -> phone uploads (BUG-IMG-02)
;     --metrics                    -> server metrics endpoint
;
;   Compliance tags (in `use`):
;     disclosed   = training-data origin documented / auditable
;     undisclosed = open weights, but training data not published
;     ethical     = fully open data + permissive, audit-friendly
;
;   Lines starting with ';' are comments.
;  ============================================================

[default]
srv=--ctx-size 8192 -ngl 99 --parallel 1 --no-mmap --no-warmup --timeout 600 --metrics --reasoning-format deepseek
max=unknown
note=Unknown/untested: try your settings
chunking_size=2000
use=unknown model - check its model card before trusting it

; --- Qwen3 30B/35B-A3B - premium MoE on consumer VRAM (session 16) ---
;  ~30-35B total, only ~3B active per token. -ngl 99 sends everything to
;  the GPU, then --n-cpu-moe claws the experts of N layers back into RAM
;  until 12GB fit. Start at 25 and LOWER it while VRAM holds (faster).
[Qwen3]
srv=--ctx-size 32768 -ngl 99 --no-mmap --n-cpu-moe 26 --parallel 1 --no-warmup --timeout 600 --metrics --reasoning-format deepseek
max=262144
note=Golden Eagle | vision | reasoning | heavy
tip=Golden Eagle - apex predator, the largest and most powerful: top-quality premium MoE with vision and OCR.
chunking_size=2048
think=kwarg
use=premium local reasoning/chat; data origin undisclosed

; --- LFM2-VL-1.6B (vision) - low-power image INPUT for the demo baseline ---
;  Liquid's tiny VLM (1.6B) on the LFM2 backbone: gives Selmo "eyes" for
;  ~2GB total (Q8 model + F16 mmproj) - the planet-friendly answer to vision,
;  no 12B Pixtral / Qwen-VL needed. Non-reasoning, so no --reasoning-format.
;  Lives in models\LFM2-VL-1.6B-Q8\ with its mmproj (auto-detected by name).
;  MUST stay ABOVE [LFM2.5]/[LFM2] so 'LFM2-VL-*.gguf' matches HERE, not the
;  text sections (the filename also contains the substring 'LFM2').
;  -ngl 99 fully fits any GPU; on the CPU-only demo box override: -ngl 0 --threads 8
[LFM2-VL]
srv=--ctx-size 8192 -ngl 99 --parallel 1 --no-mmap --no-warmup --timeout 600 --metrics
max=32768
note=Merlin | vision | tiny | fast
tip=Merlin - the smallest falcon, compact and fast: a pint-sized raptor, the tiny lightning vision model (~2GB, image input/OCR).
chunking_size=2000
use=on-device image input/OCR fallback; LFM Open License (free commercial <10M)

[LFM2.5]
srv=--ctx-size 16384 -ngl 25 --parallel 1 --no-warmup --timeout 600 --metrics --reasoning-format deepseek
max=128000
note=Swift | reasoning | fast MoE
tip=Swift - one of the fastest birds alive, almost never lands: the MoE with ~1.5B active, fastest on-device, and it reasons.
chunking_size=5000
; native = always reasons (button locked ON). If LFM2.5 turns out to honour
; enable_thinking, switch this to kwarg after a quick test.
think=native
use=fast on-device reasoning; data origin undisclosed

; --- LFM2-8B-A1B (NON-reasoning) ---
[LFM2]
srv=--ctx-size 16384 -ngl 25 --parallel 1 --no-warmup --timeout 600 --metrics
max=32768
note=Swallow | fast MoE | no reasoning
tip=Swallow - the Swift's plainer cousin, same speed-and-agility family but no reasoning: fast raw translation.
chunking_size=4000
use=fast raw translation, on-device; data origin undisclosed

; --- Mistral 7B Instruct v0.3 (Apache 2.0) - DEMO / low-end baseline ---
;  Small European model you can REDISTRIBUTE (Apache 2.0), unlike Ministral 8B
;  (Mistral Research License, non-commercial). Q3_K_M ~3.5GB (yours) or
;  Q4_K_M ~4.4GB fits a 16GB
;  CPU-only laptop (Ryzen 7 5700U, integrated Radeon, no dedicated VRAM).
;  Non-reasoning -> no --reasoning-format, no THINK button (think= omitted).
;  Must stay ABOVE [Mistral] so 'Mistral-7B-*.gguf' matches HERE, not the 24B.
;  -ngl 99 fits any GPU fully and is harmless on a CPU/Vulkan build; on the
;  CPU-only demo box override at launch to:  -ngl 0 --threads 8
[Mistral-7B]
srv=--ctx-size 8192 -ngl 99 --parallel 1 --no-mmap --no-warmup --timeout 600 --metrics --flash-attn
max=32768
note=Sparrow | text | light | Apache
tip=Sparrow - hardy and ubiquitous, thrives anywhere: the small Apache baseline that runs on any low-end machine.
chunking_size=2000
use=distributable demo baseline (Apache 2.0); data origin undisclosed

; --- Mistral Small 3.2 24B - 40 layers ---
;  IQ3_M ~10.5GB fits in 12GB; Q4_K_M ~13.5GB does NOT without KV compression.
;  --cache-type-k/v q4_0 saves ~1GB of KV cache and keeps all layers on GPU.
;  --no-mmap forces full load into RAM (no disk streaming slowing inference).
;  --flash-attn gives ~10-15% speed boost at longer contexts.
;  No --reasoning-format: Mistral is non-reasoning, THINK panel stays hidden.
[Mistral]
srv=--ctx-size 8192 -ngl 99 --parallel 1 --no-mmap --no-warmup --timeout 600 --metrics --flash-attn --cache-type-k q4_0 --cache-type-v q4_0
max=131072
note=Raven | text | heavy | translator
tip=Raven - the smartest, most versatile bird in the yard: the dependable production all-rounder and best general translator.
chunking_size=3000
use=general chat/translation/summary, production default; data origin undisclosed

; --- Magistral Small 2509 - 24B reasoning, 40 layers ---
;  ctx 16384 -> ~2.7GB KV cache, overflows 12GB. ctx 8192 keeps all on GPU.
[Magistral]
srv=--ctx-size 8192 -ngl 40 --parallel 1 --no-mmap --no-warmup --timeout 600 --metrics --reasoning-format deepseek
max=131072
note=Hawk | vision | reasoning
tip=Hawk - a versatile sharp-eyed all-rounder: reasoning, OCR, multilingual sight.
chunking_size=1200
think=instr
use=images/OCR + reasoning, multilingual; data origin undisclosed

[Olmo]
srv=--ctx-size 8192 -ngl 33 --parallel 1 --no-warmup --timeout 600 --metrics --reasoning-format deepseek
max=65536
note=Robin | reasoning | open data
tip=Robin - the American Robin, native and out in the open: American, fully transparent training data, reasoning-native.
chunking_size=1500
think=native
use=auditable / fully open work; data origin disclosed (ethical)

[gemma]
srv=--ctx-size 8192 -ngl 49 --parallel 1 --no-warmup --timeout 600 --metrics --reasoning-format deepseek
max=262144
note=Owl | vision | reasoning | big ctx
tip=Owl - sees in the dark and carries deep, many-tongued knowledge: OCR, huge context, 140 languages.
chunking_size=2000
think=native
use=images/OCR + thinking, large context; data origin undisclosed

; --- EuroLLM-22B Q3_K_M - 54 layers, KV cache quantized to fit 12GB VRAM ---
;  Without --cache-type-k/v q4_0 the model (~10.5GB) + KV cache at ctx 8192
;  (~1.8GB) overflows 12GB and layers silently fall back to CPU.
;  Quality is unremarkable vs 9B for translation; keep for testing only.
[EuroLLM-22]
srv=--ctx-size 8192 -ngl 54 --parallel 1 --no-mmap --no-warmup --timeout 600 --metrics --cache-type-k q4_0 --cache-type-v q4_0
max=32768
note=Crane | EU | heavy | testing
tip=Crane - a big European migrator, stately but heavy on the wing: larger yet not better than the Raven (testing only).
chunking_size=3000
use=EU multilingual translation (22B); data origin disclosed (most compliant)

; --- EuroLLM-9B Q4_K_M - native ctx is 4096, no point asking for more ---
[EuroLLM-9B]
srv=--ctx-size 4096 -ngl 43 --parallel 1 --no-warmup --timeout 600 --metrics
max=4096
note=Starling | EU | multilingual
tip=Starling - European to the bone and a master mimic of countless calls: a multilingual EU translator with disclosed, auditable data.
chunking_size=1500
use=EU multilingual translation; data origin disclosed (most compliant)
