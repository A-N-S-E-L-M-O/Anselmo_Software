; ============================================================
;  Selmo - model defaults     (edit this file freely)
; ------------------------------------------------------------
;  The launcher does NOTHING on its own: it only reads this
;  file and PROPOSES the values. Press ENTER to accept or type
;  your own at the prompt - nothing is forced.
;
;  Each [section] is a piece of text matched, case-insensitive,
;  inside the model's file name. The FIRST section that matches
;  wins, so put more specific names higher up (e.g. LFM2.5 above
;  LFM2). If nothing matches, [default] is used.
;
;  Keys read by the launcher:
;    ngl  = GPU layers to offload (-ngl). layers+1 = whole model
;           on GPU. Lower it if VRAM is short.
;    ctx  = context window (--ctx) proposed at launch, in tokens.
;           Bigger = more RAM and slower; needed for long files.
;    max  = model's NATIVE context (its ceiling). Shown at launch
;           so you know how high ctx can go. Don't exceed it.
;    note = short label shown next to the model in the menu.
;    cpumoe = (MoE models only) expert layers kept on CPU/RAM
;           (--n-cpu-moe N). Lets a big MoE run on little VRAM:
;           backbone on GPU, experts in RAM. Blank/0 = off. Lower
;           the number to push more experts onto the GPU (faster).
;    chunk_ratio  = fraction of ctx given to the input chunk (0.0–1.0).
;           The rest goes to output (reasoning + answer). Smaller =
;           more room for the model to think. Typical: 0.15 reasoning,
;           0.20 reasoning-native, 0.25 plain.
;    chunk_maxtok = hard cap on output tokens per chunk (reasoning included).
;           Raise for thinking-heavy models; lower to speed up plain ones.
;
;  Key ignored by the launcher (a note for you):
;    use  = when to use it + compliance / data-origin status.
;
;  Compliance tags:
;    disclosed   = training-data origin documented / auditable
;    undisclosed = open weights, but training data not published
;    ethical     = fully open data + permissive, audit-friendly
;
;  Lines starting with ';' are comments.
; ============================================================

[default]
ngl=99
ctx=8192
max=unknown
cpumoe=
chunk_ratio=0.25
chunk_maxtok=6000
note=Unknown/untested: try your settings
use=unknown model - check its model card before trusting it

; --- Qwen3 30B/35B-A3B - premium MoE on consumer VRAM (session 16) ---
;  ~30-35B total, only ~3B active per token. -ngl 99 sends everything to
;  the GPU, then cpumoe claws the experts of N layers back into RAM until
;  the 12GB fit. Start at 28 and LOWER it while VRAM holds (faster).
[Qwen3]
ngl=99
ctx=16384
max=262144
cpumoe=25
chunk_ratio=0.15
chunk_maxtok=8000
note=premium MoE, big-model quality, experts in RAM
use=premium local reasoning/chat; data origin undisclosed

